<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="common.css">
</head><body>
<div id="server"></div>

<h2>Vibe Preset</h2>
<div class="row">
  <label>Preset</label>
  <select id="preset"></select>
  <button id="refresh">↻</button>
</div>
<div class="hint">Applies to every connected Neewer light + every Govee device.</div>

<script src="common.js"></script>
<script>
document.getElementById('server').innerHTML = boisPI.serverBlock();
boisPI.onSettings = (s) => {
  boisPI.wireServerBlock();
  boisPI.loadPresets('preset', s.preset);
  boisPI.bind('#preset', 'preset');
  document.getElementById('refresh').onclick = () => boisPI.loadPresets('preset', boisPI.settings.preset);
};
</script>
</body></html>
