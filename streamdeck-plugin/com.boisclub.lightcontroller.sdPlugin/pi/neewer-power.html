<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="common.css">
</head><body>
<div id="server"></div>

<h2>Neewer · Power</h2>
<div class="row">
  <label>Light</label>
  <select id="light"></select>
  <button id="refresh">↻</button>
</div>
<div class="hint">Leave on "(any / all)" to broadcast.</div>

<div class="row">
  <label>Mode</label>
  <select id="mode">
    <option value="toggle">Toggle</option>
    <option value="on">On</option>
    <option value="off">Off</option>
  </select>
</div>

<script src="common.js"></script>
<script>
document.getElementById('server').innerHTML = boisPI.serverBlock();
boisPI.onSettings = (s) => {
  boisPI.wireServerBlock();
  if (!s.mode) s.mode = 'toggle';
  document.getElementById('mode').value = s.mode;
  boisPI.loadNeewerLights('light', s.light);
  boisPI.bind('#light', 'light');
  boisPI.bind('#mode', 'mode');
  document.getElementById('refresh').onclick = () => boisPI.loadNeewerLights('light', boisPI.settings.light);
};
</script>
</body></html>
