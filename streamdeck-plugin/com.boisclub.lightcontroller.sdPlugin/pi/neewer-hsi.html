<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="common.css">
</head><body>
<div id="server"></div>

<h2>Neewer · HSI</h2>
<div class="row">
  <label>Light</label>
  <select id="light"></select>
  <button id="refresh">↻</button>
</div>
<div class="row">
  <label>Colour</label>
  <input type="color" id="hex">
  <span class="value" id="hexVal"></span>
</div>
<div class="hint">Hue + saturation are derived from this picker. Brightness is separate.</div>
<div class="row">
  <label>Brightness</label>
  <input type="range" id="brightness" min="0" max="100" step="1">
  <span class="value" id="brrVal"></span>
</div>

<script src="common.js"></script>
<script>
function rgbToHsi(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0, v = max;
  const d = max - min;
  s = max === 0 ? 0 : d / max;
  if (max !== min) {
    if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h /= 6;
  }
  return { hue: Math.round(h * 360), sat: Math.round(s * 100) / 100 };
}
function applyHex(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const { hue, sat } = rgbToHsi(r, g, b);
  boisPI.settings.hex = hex;
  boisPI.settings.hue = hue;
  boisPI.settings.saturation = sat;
  document.getElementById('hexVal').textContent = `H${hue}° S${Math.round(sat*100)}%`;
  boisPI.save();
}
document.getElementById('server').innerHTML = boisPI.serverBlock();
boisPI.onSettings = (s) => {
  boisPI.wireServerBlock();
  if (s.brightness == null) s.brightness = 80;
  if (!s.hex) s.hex = '#ff8800';
  document.getElementById('hex').value = s.hex;
  document.getElementById('brightness').value = s.brightness;
  document.getElementById('brrVal').textContent = s.brightness + '%';
  applyHex(s.hex);
  boisPI.loadNeewerLights('light', s.light);
  boisPI.bind('#light', 'light');
  boisPI.bind('#brightness', 'brightness', (v) => parseInt(v, 10));
  document.getElementById('hex').addEventListener('input', (e) => applyHex(e.target.value));
  document.getElementById('brightness').addEventListener('input', (e) => document.getElementById('brrVal').textContent = e.target.value + '%');
  document.getElementById('refresh').onclick = () => boisPI.loadNeewerLights('light', boisPI.settings.light);
};
</script>
</body></html>
