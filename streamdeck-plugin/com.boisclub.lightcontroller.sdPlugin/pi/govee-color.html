<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="common.css">
</head><body>
<div id="server"></div>

<h2>Govee · Colour</h2>
<div class="row">
  <label>Device</label>
  <select id="device"></select>
  <button id="refresh">↻</button>
</div>
<div class="row">
  <label>Colour</label>
  <input type="color" id="hex">
  <span class="value" id="hexVal"></span>
</div>

<script src="common.js"></script>
<script>
document.getElementById('server').innerHTML = boisPI.serverBlock();
boisPI.onSettings = (s) => {
  boisPI.wireServerBlock();
  if (!s.hex) s.hex = '#ff8800';
  document.getElementById('hex').value = s.hex;
  document.getElementById('hexVal').textContent = s.hex.toUpperCase();
  boisPI.loadGoveeDevices('device', s.device, true);
  boisPI.bind('#device', 'device');
  boisPI.bind('#hex', 'hex');
  document.getElementById('hex').addEventListener('input', (e) => document.getElementById('hexVal').textContent = e.target.value.toUpperCase());
  document.getElementById('refresh').onclick = () => boisPI.loadGoveeDevices('device', boisPI.settings.device, true);
};
</script>
</body></html>
