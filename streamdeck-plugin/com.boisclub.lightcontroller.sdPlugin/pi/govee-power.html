<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="common.css">
</head><body>
<div id="server"></div>

<h2>Govee · Power</h2>
<div class="row">
  <label>Device</label>
  <select id="device"></select>
  <button id="refresh">↻</button>
</div>
<div class="hint">Pick a specific light by IP, or "(all Govee)" to broadcast.</div>
<div class="row">
  <label>Mode</label>
  <select id="mode">
    <option value="on">On</option>
    <option value="off">Off</option>
  </select>
</div>

<script src="common.js"></script>
<script>
document.getElementById('server').innerHTML = boisPI.serverBlock();
boisPI.onSettings = (s) => {
  boisPI.wireServerBlock();
  if (!s.mode) s.mode = 'on';
  document.getElementById('mode').value = s.mode;
  boisPI.loadGoveeDevices('device', s.device, true);
  boisPI.bind('#device', 'device');
  boisPI.bind('#mode', 'mode');
  document.getElementById('refresh').onclick = () => boisPI.loadGoveeDevices('device', boisPI.settings.device, true);
};
</script>
</body></html>
