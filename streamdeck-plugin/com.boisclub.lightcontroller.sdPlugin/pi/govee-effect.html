<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="common.css">
</head><body>
<div id="server"></div>

<h2>Govee · Effect</h2>
<div class="row">
  <label>Device</label>
  <select id="device"></select>
  <button id="refresh-dev">↻</button>
</div>
<div class="row">
  <label>Effect</label>
  <select id="effect"></select>
  <button id="refresh-fx">↻</button>
</div>
<div class="hint">Effects run as a software loop on the server (Govee LAN API has no native scenes). Pick "Stop running effect" to halt the loop.</div>

<script src="common.js"></script>
<script>
document.getElementById('server').innerHTML = boisPI.serverBlock();
boisPI.onSettings = (s) => {
  boisPI.wireServerBlock();
  boisPI.loadGoveeDevices('device', s.device, true);
  boisPI.loadEffects('effect', s.effect);
  boisPI.bind('#device', 'device');
  boisPI.bind('#effect', 'effect');
  document.getElementById('refresh-dev').onclick = () => boisPI.loadGoveeDevices('device', boisPI.settings.device, true);
  document.getElementById('refresh-fx').onclick = () => boisPI.loadEffects('effect', boisPI.settings.effect);
};
</script>
</body></html>
